<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app" id="app">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="user-bar">
        <span id="me-name">…</span>
        <div class="user-bar-actions">
          <button id="logout-btn" class="ghost">로그아웃</button>
          <button id="close-sidebar" class="ghost mobile-only" aria-label="닫기">✕</button>
        </div>
      </div>

      <h3>접속 중 <span id="presence-count" class="count-tag">0</span></h3>
      <ul id="presence-list" class="presence-list"></ul>

      <div class="room-create">
        <input id="new-room" type="text" placeholder="새 채팅방 이름" maxlength="40" />
        <button id="create-room">생성</button>
      </div>

      <h3>채팅방</h3>
      <ul id="room-list" class="room-list"></ul>
      <div id="room-empty" class="empty-state side-empty">아직 채팅방이 없습니다.<br/>위에서 만들어보세요.</div>
    </aside>

    <section class="chat">
      <header class="chat-header">
        <button id="open-sidebar" class="icon-btn mobile-only" aria-label="채팅방 목록 열기">☰</button>
        <h2 id="room-name">채팅방을 선택하세요</h2>
      </header>
      <div id="messages-wrap" class="messages-wrap">
        <button id="load-more-btn" class="load-more" hidden>옛 메시지 불러오기</button>
        <ul id="messages" class="messages"></ul>
        <div id="chat-empty" class="empty-state chat-empty">
          <div class="empty-icon">💬</div>
          <div>왼쪽에서 채팅방을 선택하세요</div>
        </div>
        <button id="scroll-down-btn" class="scroll-down-btn" hidden>새 메시지 ↓</button>
      </div>
      <div id="typing-indicator" class="typing-indicator"></div>
      <div id="attachment-preview" class="attachment-preview" hidden>
        <span id="attachment-name"></span>
        <button id="attachment-cancel" type="button" class="icon-btn" aria-label="첨부 취소">✕</button>
      </div>
      <form id="send-form" class="send-form">
        <input id="file-input" type="file" hidden />
        <button id="file-btn" type="button" class="icon-btn" aria-label="파일 첨부" disabled>📎</button>
        <input id="msg-input" type="text" placeholder="메시지를 입력하세요" autocomplete="off" maxlength="1000" disabled />
        <button id="send-btn" type="submit" disabled>전송</button>
      </form>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
